<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: black; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <img id="dashboard" src="" alt="Cargando Bilbao...">

    <script>
        function updateImage() {
            // Generamos un número único basado en la hora actual
            var timestamp = new Date().getTime();
            // Construimos la URL con el parámetro 't' que cambia siempre
            var baseUrl = "https://images.weserv.nl/?url=raw.githubusercontent.com/xigoa/myKindleDashboard/main/dashboard.png";
            var params = "&ro=90&nocache=1&t=" + timestamp;
            
            document.getElementById('dashboard').src = baseUrl + params;
        }

        // Ejecutar la carga inicial
        updateImage();

        // Recargar la página completa cada 10 minutos (600.000 ms)
        setTimeout(function(){ 
            location.reload(true); 
        }, 600000);
    </script>
</body>
</html>
