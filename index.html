<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bilbao Dashboard</title>
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #000000; 
            overflow: hidden; 
            display: flex;
            justify-content: flex-start; 
            align-items: center; 
            height: 100vh;
            width: 100vw;
            transition: background-color 0.1s; /* Suaviza el micro-cambio de color */
        }
        
        img {
            height: 100%; 
            width: auto;
            display: block;
        }
    </style>
</head>
<body>

    <img id="dashboard" src="" alt="Cargando Bilbao...">

    <script>
        // 1. FUNCIÓN PRINCIPAL DE DIBUJO
        function updateImage() {
            var timestamp = new Date().getTime();
            var baseUrl = "https://images.weserv.nl/?url=raw.githubusercontent.com/xigoa/myKindleDashboard/main/dashboard.png";
            var params = "&ro=90&nocache=1&t=" + timestamp;
            
            document.getElementById('dashboard').src = baseUrl + params;
            console.log("Imagen actualizada: " + timestamp);
        }

        // Carga la imagen la primera vez
        updateImage();

        // Refresco elegante: actualiza SOLO la imagen cada 10 minutos (600000 ms)
        setInterval(updateImage, 600000); 

        // 2. HACK ANTI-SUEÑO (Modo Visual + Red)
        var toggle = false;
        
        function stayAwake() {
            // A. Cambio visual invisible (fuerza al renderizador a trabajar)
            document.body.style.backgroundColor = toggle ? "#010101" : "#000000";
            toggle = !toggle;
            
            // B. Petición fantasma para mantener la antena WiFi despierta
            var xhr = new XMLHttpRequest();
            // Pedimos la propia URL en la que estamos con un parámetro falso
            xhr.open('GET', window.location.href.split('?')[0] + '?dummy=' + new Date().getTime(), true);
            xhr.send();
        }
        
        // Ejecutar el latido anti-sueño cada 30 segundos
        setInterval(stayAwake, 30000);
    </script>
</body>
</html>
