<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bilbao Dashboard</title>
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: black; 
            overflow: hidden; /* Evita que aparezcan barras de scroll */
            display: flex;
            justify-content: flex-start; /* Pega la imagen al borde (que será el superior al tumbarlo) */
            align-items: center; 
            height: 100vh;
            width: 100vw;
        }
        
        img {
            height: 100%; /* Obliga a la imagen a ocupar todo el alto del navegador */
            width: auto;
            display: block;
        }
    </style>
    </head>
<body>

    <img id="dashboard" src="" alt="Cargando Bilbao...">

    <script>
        function updateImage() {
            var timestamp = new Date().getTime();
            // Recuerda: &ro=90 gira la imagen para que encaje al tumbar el Kindle
            var baseUrl = "https://images.weserv.nl/?url=raw.githubusercontent.com/xigoa/myKindleDashboard/main/dashboard.png";
            var params = "&ro=90&nocache=1&t=" + timestamp;
            
            document.getElementById('dashboard').src = baseUrl + params;
        }

        updateImage();

        // Función para evitar que el navegador se "duerma"
        function stayAwake() {
            // Hace un scroll mínimo de 1 píxel y vuelve
            window.scrollBy(0, 1);
            window.scrollBy(0, -1);
            
            // Imprime algo en la consola invisible
            console.log("Keep alive: " + new Date().getTime());
        }
        
        // Ejecutar cada 30 segundos
        setInterval(stayAwake, 30000);

        // Forzar al navegador a creer que hay una descarga pesada en curso
        function fakeActivity() {
            var xhr = new XMLHttpRequest();
            // Pedimos la propia imagen con un parámetro aleatorio para que no use caché
            xhr.open('GET', 'dashboard.png?dummy=' + Math.random(), true);
            xhr.send();
            console.log("Actividad simulada para evitar sleep");
        }

        // Ejecutar cada 45 segundos (antes de que salte el timeout del Kindle)
        setInterval(fakeActivity, 30000);

        // Refresco cada 10 minutos
        setTimeout(function(){ 
            location.reload(true); 
        }, 600000);
    </script>
</body>
</html>
